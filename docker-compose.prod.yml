# Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
# IMPORTANT: Make sure COMPOSE_PROJECT_NAME is set in .env for uniqueness!

services:
  # PHP-FPM Service
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    restart: always
    working_dir: /var/www/html
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - PHP_IDE_CONFIG=serverName=production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - laravel-network
    healthcheck:
      test: ["CMD-SHELL", "pgrep php-fpm > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Service
  webserver:
    image: nginx:alpine
    restart: always
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - app
    networks:
      - laravel-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MySQL Service
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-laravel}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - laravel-network
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  # Redis Service
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - laravel-network
    command: redis-server --appendonly yes

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    restart: always
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      - APP_ENV=production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - laravel-network

  # Scheduler
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    restart: always
    working_dir: /var/www/html
    command: >
      sh -c "while [ true ]; do
               php artisan schedule:run --verbose --no-interaction &
               sleep 60
             done"
    environment:
      - APP_ENV=production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - laravel-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  laravel-network:
    driver: bridge
